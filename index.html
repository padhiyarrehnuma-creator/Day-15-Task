<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendAura Final</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<div class="navbar">
<h2>Fashion FashionFiesta</h2>

<div class="nav-links">
<span onclick="filterCat('all')">All</span>
<span onclick="filterCat('Clothing')">Clothing</span>
<span onclick="filterCat('Traditional')">Traditional</span>
<span onclick="filterCat('Party')">Party</span>
<span onclick="filterCat('Short Dress')">Short Dress</span>
<span onclick="filterCat('Jeans')">Jeans</span>
<span onclick="filterCat('Jewellery')">Jewellery</span>
<span onclick="filterCat('Makeup')">Makeup</span>
<span onclick="filterCat('Footwear')">Footwear</span>
</div>

<div>
<span onclick="toggleSearch()">🔍</span>
<span onclick="openWishlist()">❤️ <b id="wishCount">0</b></span>
<span onclick="openCart()">🛒 <b id="cartCount">0</b></span>
</div>
</div>

<div class="search-box" id="searchBox">
<input type="text" placeholder="Search..." onkeyup="searchProduct(this.value)">
</div>
</header>

<!-- SLIDER -->
<div class="slider">
<button class="arrow left" onclick="prevSlide()">◀</button>
<img id="sliderImg">
<button class="arrow right" onclick="nextSlide()">▶</button>
</div>

<main>
<div class="container" id="products"></div>
</main>

<!-- POPUPS -->
<div class="modal" id="productModal"><div class="modal-content">
<h3 id="pTitle"></h3>
<p id="pDesc"></p>
<input id="commentBox" placeholder="Write comment">
<button onclick="saveComment()">Submit</button>
<p id="savedComment"></p>
<button onclick="closeProduct()">Close</button>
</div></div>

<div class="modal" id="cartModal"><div class="modal-content">
<h3>Cart</h3><div id="cartList"></div>
<button onclick="closeCart()">Close</button>
</div></div>

<div class="modal" id="wishModal"><div class="modal-content">
<h3>Wishlist</h3><div id="wishList"></div>
<button onclick="closeWish()">Close</button>
</div></div>

<div class="modal" id="buyModal"><div class="modal-content">
<h2>🛍️ Thank You for Shopping!</h2>
<button onclick="closeBuy()">Close</button>
</div></div>

<footer>
<div class="footer-grid">
<div><h3>TrendAura</h3><p>Fashion Store</p></div>
<div><h3>Categories</h3><p>All Products</p></div>
<div><h3>Support</h3><p>Help | FAQ</p></div>
<div><h3>Contact</h3><p>India</p></div>
</div>
<div class="footer-bottom">© 2026 FashionFiesta | All right reserved</div>
</footer>

<script src="script.js"></script>

</body>
</html>
